<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle del Vehículo — MotorScan Pro</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <button class="mobile-toggle" aria-label="Menú">☰</button>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand"><div class="logo-icon">⚡</div><div><h1>MotorScan</h1><small>Diagnóstico Pro</small></div></div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Principal</div>
        <a href="index.html" class="nav-item"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="vehicles.html" class="nav-item"><span class="nav-icon">🚗</span> Vehículos</a>
        <div class="nav-section-label">Diagnóstico</div>
        <a href="scans.html" class="nav-item"><span class="nav-icon">🔍</span> Escaneos</a>
        <a href="reports.html" class="nav-item"><span class="nav-icon">📋</span> Reportes</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info"><div class="user-avatar">CM</div><div class="user-details"><div class="name">Cargando...</div><div class="role">—</div></div>
          <button onclick="logout()" class="btn btn-secondary" style="padding:4px 8px;font-size:11px;">Salir</button></div>
      </div>
    </aside>

    <main class="main-content">
      <div style="margin-bottom:8px"><a href="vehicles.html" style="font-size:12px;color:var(--text-tertiary);">← Volver a Vehículos</a></div>
      <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div><h2 id="vTitle">Cargando...</h2><p id="vSub"></p></div>
        <button class="btn btn-danger" id="deleteBtn" style="display:none">🗑️ Eliminar</button>
      </div>

      <!-- Vehicle Info -->
      <div class="card fade-in" style="margin-bottom:var(--sp-5)">
        <div class="section-header"><h3>📋 Información del Vehículo</h3></div>
        <div class="grid-3" id="vInfo" style="font-size:13px;"></div>
      </div>

      <!-- Scan History -->
      <div class="card fade-in">
        <div class="section-header"><h3>🔍 Historial de Escaneos</h3></div>
        <table class="data-table">
          <thead><tr><th>ID</th><th>Fecha</th><th>Técnico</th><th>Códigos</th><th>Estado Motor</th><th>Estado</th></tr></thead>
          <tbody id="scanHistory"></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (!requireAuth()) throw 'auth';
    (async () => {
      initSidebar();
      const id = new URLSearchParams(location.search).get('id');
      if (!id) { location.href = '/vehicles.html'; return; }

      const v = await apiFetch(`/vehicles/${id}`);
      document.getElementById('vTitle').textContent = `${v.marca} ${v.modelo} ${v.anio}`;
      document.getElementById('vSub').textContent = `VIN: ${v.vin} · Placa: ${v.placa}`;

      document.getElementById('vInfo').innerHTML = `
        <div class="vehicle-meta-item">🏷️ Marca: <span>${v.marca}</span></div>
        <div class="vehicle-meta-item">📦 Modelo: <span>${v.modelo}</span></div>
        <div class="vehicle-meta-item">📅 Año: <span>${v.anio}</span></div>
        <div class="vehicle-meta-item">🔑 VIN: <span style="font-family:var(--font-data)">${v.vin}</span></div>
        <div class="vehicle-meta-item">📍 Placa: <span>${v.placa}</span></div>
        <div class="vehicle-meta-item">🔧 Motor: <span>${v.tipoMotor}</span></div>
        <div class="vehicle-meta-item">⏱ Kilometraje: <span>${(v.kilometraje||0).toLocaleString()} km</span></div>
        <div class="vehicle-meta-item">👤 Propietario: <span>${v.owner?.nombre || '—'}</span></div>
        <div class="vehicle-meta-item">🏢 Taller: <span>${v.owner?.nombreTaller || '—'}</span></div>`;

      // Delete button
      const delBtn = document.getElementById('deleteBtn');
      delBtn.style.display = 'inline-flex';
      delBtn.addEventListener('click', async () => {
        if (confirm('¿Eliminar este vehículo y todos sus escaneos?')) {
          await apiFetch(`/vehicles/${id}`, { method: 'DELETE' });
          showToast('Vehículo eliminado');
          location.href = '/vehicles.html';
        }
      });

      // Scan history
      const tbody = document.getElementById('scanHistory');
      if (!v.scans || v.scans.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-tertiary)">Sin escaneos registrados</td></tr>';
      } else {
        v.scans.forEach(s => {
          tbody.innerHTML += `<tr onclick="location.href='scan.html?id=${s.id}'">
            <td class="mono">#${s.id}</td>
            <td class="mono">${formatDate(s.fecha)}</td>
            <td>${s.technician?.nombre || '—'}</td>
            <td class="mono">${s.codes?.length || 0}</td>
            <td><span class="badge ${badgeClass(s.estadoGeneral)}">${s.estadoGeneral}</span></td>
            <td><span class="badge ${badgeClass(s.estado)}">${s.estado}</span></td>
          </tr>`;
        });
      }
    })();
  </script>
</body>
</html>
